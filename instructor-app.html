<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>教官值勤・鐘點記錄</title>
<style>
  :root {
    --bg: #f0f4ff;
    --app-bg: #ffffff;
    --card: #ffffff;
    --card-2: #f4f7ff;
    --line: #dde5f5;
    --line-strong: #bccbee;
    --ink: #0b1e4a;
    --ink-2: #2a4070;
    --ink-3: #6878a8;
    --primary: #1b3d8f;
    --primary-ink: #0b1e4a;
    --primary-tint: #e4ecfb;
    --accent: #c8880a;
    --accent-tint: #fff4cc;
    --main-role: #1b3d8f;
    --main-role-tint: #e4ecfb;
    --assist-role: #2d6ae0;
    --assist-role-tint: #e8f0ff;
    --good: #1a7a48;
    --shadow: 0 1px 2px rgba(11,30,74,.05), 0 8px 24px rgba(11,30,74,.07);
    --shadow-pop: 0 -2px 12px rgba(11,30,74,.08);
    --radius: 16px;
    --radius-sm: 11px;
    --font: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  .device {
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    background: var(--app-bg);
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: var(--shadow);
  }
  @media (min-width: 500px) {
    body { padding: 22px 0; align-items: flex-start; }
    .device { min-height: calc(100vh - 44px); border-radius: 26px; overflow: hidden; }
  }

  /* Header */
  header.top {
    background: var(--app-bg);
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(150deg, var(--primary), var(--primary-ink));
    display: grid; place-items: center; color: #fff; font-size: 15px; flex: none;
    box-shadow: 0 2px 6px rgba(14,91,99,.3);
  }
  .brand h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: .2px; }
  .brand .sub { font-size: 11px; color: var(--ink-3); margin-top: 1px; letter-spacing: .3px; }
  .demo-tag {
    margin-left: auto; font-size: 10.5px; font-weight: 600; color: var(--accent);
    background: var(--accent-tint); padding: 3px 8px; border-radius: 999px; letter-spacing: .3px;
    white-space: nowrap;
  }

  /* Month segmented */
  .months {
    display: flex; gap: 5px; margin-top: 12px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
  }
  .months::-webkit-scrollbar { display: none; }
  .month-chip {
    flex: none; border: 1px solid var(--line-strong); background: var(--card);
    color: var(--ink-2); font-size: 13px; font-weight: 600; font-family: inherit;
    padding: 6px 14px; border-radius: 999px; cursor: pointer; transition: .15s;
  }
  .month-chip[aria-pressed="true"] {
    background: var(--primary); border-color: var(--primary); color: #fff;
    box-shadow: 0 2px 8px rgba(14,91,99,.28);
  }

  main { flex: 1; padding: 14px 14px 96px; overflow-y: auto; }

  /* Summary card */
  .summary {
    background: linear-gradient(158deg, var(--primary), var(--primary-ink));
    color: #fff; border-radius: var(--radius); padding: 16px 18px 15px;
    box-shadow: 0 6px 18px rgba(14,91,99,.28); position: relative; overflow: hidden;
  }
  .summary::after {
    content: ""; position: absolute; right: -34px; top: -34px; width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(255,255,255,.14), transparent 68%); pointer-events: none;
  }
  .summary .lbl { font-size: 12px; opacity: .82; letter-spacing: .4px; }
  .summary .big { font-size: 33px; font-weight: 800; letter-spacing: .5px; margin: 2px 0 12px; }
  .summary .big small { font-size: 15px; font-weight: 600; opacity: .8; margin-right: 3px; }
  .summary .row { display: flex; gap: 8px; }
  .summary .stat {
    flex: 1; background: rgba(255,255,255,.13); border-radius: 11px; padding: 8px 10px;
    backdrop-filter: blur(2px);
  }
  .summary .stat .n { font-size: 17px; font-weight: 700; }
  .summary .stat .k { font-size: 10.5px; opacity: .82; margin-top: 1px; letter-spacing: .3px; }

  .section-h {
    display: flex; align-items: baseline; gap: 8px; margin: 20px 4px 9px;
  }
  .section-h h2 { font-size: 13px; font-weight: 700; margin: 0; color: var(--ink-2); letter-spacing: .4px; }
  .section-h .count { font-size: 11px; color: var(--ink-3); }

  /* Entry list */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .entry {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 11px 13px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: .12s; box-shadow: var(--shadow);
  }
  .entry:active { transform: scale(.985); background: var(--card-2); }
  .date-badge {
    flex: none; width: 46px; text-align: center; border-right: 1px solid var(--line); padding-right: 11px;
  }
  .date-badge .d { font-size: 18px; font-weight: 800; line-height: 1; }
  .date-badge .w { font-size: 10.5px; color: var(--ink-3); margin-top: 3px; }
  .entry-body { flex: 1; min-width: 0; }
  .entry-body .course { font-size: 14.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-body .meta { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
  .pill {
    font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .3px;
  }
  .pill.main { color: var(--main-role); background: var(--main-role-tint); }
  .pill.assist { color: var(--assist-role); background: var(--assist-role-tint); }
  .time-pill { font-size: 10.5px; font-weight: 600; color: var(--ink-2); background: var(--card-2);
    border: 1px solid var(--line); padding: 2px 7px; border-radius: 999px; }
  .wk-hint { font-size: 12px; color: var(--primary-ink); font-weight: 600; margin-top: 6px; }
  .wk-hint.bad { color: #c0453b; }
  .entry-body .hrs { font-size: 11.5px; color: var(--ink-3); }
  .entry-amt { flex: none; text-align: right; }
  .entry-amt .a { font-size: 15px; font-weight: 700; }
  .entry-amt .r { font-size: 10.5px; color: var(--ink-3); margin-top: 2px; }

  .empty {
    text-align: center; color: var(--ink-3); font-size: 13px; padding: 40px 20px;
    border: 1px dashed var(--line-strong); border-radius: var(--radius); background: var(--card-2);
  }
  .empty .em { font-size: 26px; display: block; margin-bottom: 8px; opacity: .6; }

  /* Duty */
  .duty {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 12px 13px; display: flex; gap: 12px; align-items: center; cursor: pointer;
    box-shadow: var(--shadow); transition: .12s;
  }
  .duty:active { transform: scale(.985); background: var(--card-2); }
  .duty .body { flex: 1; min-width: 0; }
  .duty .body .post { font-size: 14.5px; font-weight: 600; }
  .duty .body .note { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
  .shift-tag {
    flex: none; font-size: 11px; font-weight: 700; color: var(--accent);
    background: var(--accent-tint); padding: 4px 9px; border-radius: 8px; white-space: nowrap;
  }

  /* Stats */
  .stat-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 15px 16px; box-shadow: var(--shadow); margin-bottom: 12px;
  }
  .stat-card h3 { font-size: 12.5px; font-weight: 700; margin: 0 0 12px; color: var(--ink-2); letter-spacing: .4px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row .k { font-size: 12px; color: var(--ink-2); width: 40px; flex: none; }
  .bar-track { flex: 1; height: 22px; background: var(--card-2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), var(--primary-ink));
    display: flex; align-items: center; justify-content: flex-end; transition: width .5s cubic-bezier(.2,.7,.3,1);
  }
  .bar-row .v { font-size: 12px; font-weight: 700; width: 62px; text-align: right; flex: none; }
  .grand { display: flex; gap: 10px; }
  .grand .g {
    flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 13px 14px; box-shadow: var(--shadow);
  }
  .grand .g .n { font-size: 20px; font-weight: 800; }
  .grand .g .n.accent { color: var(--accent); }
  .grand .g .k { font-size: 11px; color: var(--ink-3); margin-top: 2px; letter-spacing: .3px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .cat-row .dot { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .cat-row .k { font-size: 12.5px; flex: 1; }
  .cat-row .v { font-size: 12.5px; font-weight: 700; }

  .note-box {
    margin-top: 6px; font-size: 11.5px; color: var(--ink-3); line-height: 1.6;
    background: var(--card-2); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px;
  }
  .note-box b { color: var(--ink-2); font-weight: 700; }
  .reset-btn {
    margin: 14px auto 0; display: block; font-family: inherit; font-size: 12px; color: var(--ink-3);
    background: none; border: none; text-decoration: underline; cursor: pointer;
  }

  /* FAB */
  .fab {
    position: absolute; right: 18px; bottom: 84px; width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none; font-size: 27px; cursor: pointer;
    box-shadow: 0 6px 18px rgba(217,130,43,.45); z-index: 25; display: grid; place-items: center;
    transition: .15s;
  }
  .fab:active { transform: scale(.9); }

  /* Tab bar */
  nav.tabs {
    position: sticky; bottom: 0; display: flex; background: var(--card);
    border-top: 1px solid var(--line); box-shadow: var(--shadow-pop); z-index: 20;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab {
    flex: 1; border: none; background: none; font-family: inherit; cursor: pointer;
    padding: 9px 0 10px; color: var(--ink-3); display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: .12s;
  }
  .tab svg { width: 22px; height: 22px; }
  .tab .t { font-size: 10.5px; font-weight: 600; letter-spacing: .3px; }
  .tab[aria-selected="true"] { color: var(--primary); }

  /* Modal sheet */
  .backdrop {
    position: fixed; inset: 0; background: rgba(10,20,20,.42); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    width: 100%; max-width: 460px; background: var(--app-bg); border-radius: 22px 22px 0 0;
    padding: 8px 18px calc(20px + env(safe-area-inset-bottom, 0)); transform: translateY(100%);
    transition: transform .28s cubic-bezier(.2,.8,.25,1); max-height: 90vh; overflow-y: auto;
  }
  .backdrop.open .sheet { transform: translateY(0); }
  .grabber { width: 38px; height: 4px; border-radius: 999px; background: var(--line-strong); margin: 6px auto 12px; }
  .sheet h3 { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
  .sheet .field { margin-top: 14px; }
  .sheet label { font-size: 12px; font-weight: 600; color: var(--ink-2); display: block; margin-bottom: 6px; letter-spacing: .3px; }
  .sheet input, .sheet select {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--ink);
    background: var(--card); border: 1px solid var(--line-strong); border-radius: 11px;
    padding: 11px 12px; outline: none; transition: .15s;
  }
  .sheet input:focus, .sheet select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-tint); }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }
  .seg { display: flex; gap: 6px; }
  .seg button {
    flex: 1; font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer;
    background: var(--card); border: 1px solid var(--line-strong); border-radius: 11px; color: var(--ink-2); transition: .12s;
  }
  .seg button[aria-pressed="true"] { background: var(--primary); border-color: var(--primary); color: #fff; }
  .seg4 button { display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 8px 3px; font-size: 13px; line-height: 1.15; }
  .seg4 button small { font-size: 9.5px; font-weight: 600; opacity: .68; }
  .cal-btn {
    width: 100%; margin-top: 10px; font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 7px; background: var(--card); color: var(--primary);
    border: 1.5px solid var(--primary); transition: .15s;
  }
  .cal-btn:active { transform: scale(.98); background: var(--primary-tint); }
  .calc-preview {
    margin-top: 14px; background: var(--primary-tint); border-radius: 12px; padding: 11px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .calc-preview .k { font-size: 12.5px; color: var(--primary-ink); font-weight: 600; }
  .calc-preview .v { font-size: 22px; font-weight: 800; color: var(--primary-ink); }
  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; font-family: inherit; font-size: 15px; font-weight: 700; padding: 13px; border-radius: 12px;
    cursor: pointer; border: none; transition: .15s;
  }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 3px 10px rgba(14,91,99,.3); }
  .btn-primary:active { transform: scale(.98); }
  .btn-ghost { background: var(--card); color: var(--ink-2); border: 1px solid var(--line-strong); flex: 0 0 auto; padding: 13px 18px; }
  .btn-del { background: none; color: #c0453b; border: none; font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; display: block; margin: 14px auto 2px; }
  @media (prefers-color-scheme: dark) { .btn-del { color: #e6796e; } }
  :root[data-theme="dark"] .btn-del { color: #e6796e; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div class="device">

</div>

<div class="backdrop" id="backdrop"><div class="sheet" id="sheet"></div></div>

const KEY = "instructor_v2";
const API = "https://script.google.com/macros/s/AKfycbxzMtt7W8Po_JbDAwYVBkPHfjsZHL5obbAs24MHbYmR8DU7PAxijPytdNLRsHao9xuR/exec";
let state, curMonth = 7, curTab = "pay";

async function load() {
  try {
    const [sessions, duties] = await Promise.all([
      fetch(API + "?action=getSessions").then(r => r.json()),
      fetch(API + "?action=getDuties").then(r => r.json()),
    ]);
    state = {sessions, duties};
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
  } catch(e) {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) { state = JSON.parse(raw); return; }
    } catch(e2){}
    state = {sessions:[], duties:[]};
  }
}
async function apiPost(data) {
  try {
    const row = data.row ? JSON.stringify(data.row) : undefined;
    const params = new URLSearchParams({action:data.action, ...(data.sheet&&{sheet:data.sheet}), ...(data.id&&{id:data.id}), ...(row&&{row})});
    await fetch(API + '?' + params);
  } catch(e){}
}
function save(){ try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} }
function uid(){ return "x" + Math.round(performance.now()*1000) + "_" + state.sessions.length + state.duties.length; }

const MONTHS = [3,4,5,6,7,8,9,10];
const el = id => document.getElementById(id);
function courseNames(){
  return [...new Set(state.sessions.map(s=>s.course).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-Hant"));
}

/* ---------- Stats tab ---------- */
function catOf(c){
  if (c.includes("繩索")) return "繩索類";
  if (c.includes("水上") || c.includes("海洋") || c.includes("警大水上")) return "水上救生類";
  return "其他課程";
}
const CAT_COLOR = {"水上救生類":"var(--primary)","繩索類":"var(--accent)","其他課程":"var(--assist-role)"};
function renderStat(){
  const byMonth = MONTHS.map(m=>{
    const l = state.sessions.filter(s=>s.m===m);
    return {m, total:l.reduce((a,s)=>a+s.hours*s.rate,0), hours:l.reduce((a,s)=>a+s.hours,0)};
  });
  const grandTotal = byMonth.reduce((a,x)=>a+x.total,0);
  const grandHours = byMonth.reduce((a,x)=>a+x.hours,0);
  const grandN = state.sessions.length;
  const maxT = Math.max(...byMonth.map(x=>x.total), 1);
  const dataMonths = byMonth.filter(x=>x.total>0);
  const rangeLabel = dataMonths.length ? `${dataMonths[0].m}–${dataMonths[dataMonths.length-1].m}月` : "尚無資料";
  const avg = dataMonths.length ? Math.round(grandTotal/dataMonths.length) : 0;

  const cats = {};
  state.sessions.forEach(s=>{ const c=catOf(s.course); cats[c]=(cats[c]||0)+s.hours*s.rate; });
  const catArr = Object.entries(cats).sort((a,b)=>b[1]-a[1]);

  let html = `
    <div class="section-h" style="margin-top:8px"><h2>累計總覽 · ${rangeLabel}</h2></div>
    <div class="grand">
      <div class="g"><div class="n accent tnum">${fmt(grandTotal)}</div><div class="k">鐘點費合計 (元)</div></div>
      <div class="g"><div class="n tnum">${grandHours}</div><div class="k">總授課時數</div></div>
    </div>
    <div class="grand" style="margin-top:10px">
      <div class="g"><div class="n tnum">${grandN}</div><div class="k">總授課堂數</div></div>
      <div class="g"><div class="n tnum">${fmt(avg)}</div><div class="k">月均收入 (元)</div></div>
    </div>

    <div class="stat-card" style="margin-top:16px">
      <h3>每月鐘點費</h3>
      ${byMonth.map(x=>`
        <div class="bar-row">
          <div class="k">${x.m}月</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,x.total/maxT*100)}%"></div></div>
          <div class="v tnum">${fmt(x.total)}</div>
        </div>`).join("")}
    </div>

    <div class="stat-card">
      <h3>課程類別佔比</h3>
      ${catArr.map(([k,v])=>`
        <div class="cat-row">
          <span class="dot" style="background:${CAT_COLOR[k]}"></span>
          <span class="k">${k}</span>
          <span class="v tnum">${fmt(v)} 元 · ${Math.round(v/grandTotal*100)}%</span>
        </div>`).join("")}
    </div>

    <div class="note-box">
      <b>☁ 雲端版</b>：資料即時同步到 <b>Google 試算表</b>。<br>
      兩支手機各自「加入主畫面」後，填的內容兩人都看得到。
    </div>
    <button class="reset-btn" id="resetBtn">↺ 重新載入資料</button>`;
  el("main").innerHTML = html;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- Render dispatch ---------- */
function render(){
  el("hdrTitle").textContent = curTab==="pay" ? "鐘點記錄" : curTab==="duty" ? "值班表" : "收入統計";
  el("hdrSub").textContent = curTab==="pay" ? "授課鐘點・自動算金額" : curTab==="duty" ? "每月值班・勤務登記" : "累計收入與分析";

}

function paySheet(existing){
  const s = existing || {m:curMonth, d:1, course:"", role:"main", slot:"full", hours:8, rate:800};
  const curSlot = s.slot && SLOTS[s.slot] ? s.slot : "full";
  const dateVal = `${YEAR}-${pad(s.m)}-${pad(s.d)}`;
  const minM = MONTHS[0], maxM = MONTHS[MONTHS.length-1];
  const lastDay = new Date(YEAR, maxM, 0).getDate();
  openSheet(`
    <h3>${existing?"編輯授課":"新增授課"}</h3>
    <div class="field"><label>上課日期</label>
      <input id="f_date" type="date" value="${dateVal}" min="${YEAR}-${pad(minM)}-01" max="${YEAR}-${pad(maxM)}-${pad(lastDay)}">
      <div class="wk-hint" id="f_wk"></div>
    </div>
    <div class="field"><label>時段<span style="font-weight:400;color:var(--ink-3)"> · 選了自動帶時數</span></label>
      <div class="seg seg4" id="f_slot">
        ${SLOT_ORDER.map(k=>`<button type="button" data-p="${k}" aria-pressed="${curSlot===k}">${SLOTS[k].label}<small>${SLOTS[k].hours}時</small></button>`).join("")}
      </div>
    </div>
    <div class="field"><label>課程名稱<span style="font-weight:400;color:var(--ink-3)"> · 可下拉選用過的</span></label>
      <input id="f_course" type="text" list="courseList" value="${esc(s.course)}" placeholder="點一下可選，或直接打新的">
      <datalist id="courseList">${courseNames().map(c=>`<option value="${esc(c)}"></option>`).join("")}</datalist>
    </div>
    <div class="field"><label>身分</label>
      <div class="seg" id="f_role">
        <button type="button" data-r="main" aria-pressed="${s.role==="main"}">主教</button>
        <button type="button" data-r="assist" aria-pressed="${s.role==="assist"}">助教</button>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>時數</label><input id="f_hours" type="number" min="0" step="0.5" value="${s.hours}"></div>
      <div class="field"><label>時薪 (元)</label><input id="f_rate" type="number" min="0" step="50" value="${s.rate}"></div>
    </div>
    <div class="calc-preview"><span class="k">金額（時數 × 時薪）</span><span class="v tnum" id="f_calc">0</span></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="f_cancel">取消</button>
      <button class="btn btn-primary" id="f_save">儲存</button>
    </div>
    <button type="button" class="cal-btn" id="f_cal">📅 加入 Google 行事曆</button>
    ${existing?`<button class="btn-del" id="f_del">刪除這筆</button>`:""}
  `);

  const parseDate = ()=>{ const [y,m,d] = el("f_date").value.split("-").map(Number); return {m,d}; };
  const showWk = ()=>{
    const v = el("f_date").value; const hint = el("f_wk");
    if (!v){ hint.textContent = ""; return; }
    const {m,d} = parseDate();
    const w = wk(m,d);
    const weekend = (w==="六" || w==="日");
    hint.textContent = `${m}月${d}日 · 星期${w}${weekend?"（假日）":""}`;
  };
  const calc = ()=>{ el("f_calc").textContent = fmt((+el("f_hours").value||0)*(+el("f_rate").value||0)); };
  ["f_hours","f_rate"].forEach(id=> el(id).addEventListener("input", calc));
  el("f_date").addEventListener("input", showWk);
  el("f_slot").addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b) return;
    el("f_slot").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
    el("f_hours").value = SLOTS[b.dataset.p].hours; calc(); });   // 選時段自動帶時數
  el("f_role").addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    el("f_role").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
    if (!existing){ el("f_rate").value = b.dataset.r==="main" ? 800 : 400; calc(); }
  });
  showWk(); calc();

  const readForm = ()=>{
    const {m,d} = parseDate();
    return {
      m: m||curMonth, d: d||1, course:el("f_course").value.trim()||"未命名課程",
      role: el("f_role").querySelector('[aria-pressed="true"]').dataset.r,
      slot: el("f_slot").querySelector('[aria-pressed="true"]').dataset.p,
      hours:+el("f_hours").value||0, rate:+el("f_rate").value||0
    };
  };
  el("f_cancel").onclick = closeSheet;
  el("f_cal").onclick = ()=>{ window.open(calUrl(readForm()), "_blank", "noopener"); };
  el("f_save").onclick = ()=>{
    const rec = readForm();
    if (existing){ Object.assign(existing, rec); apiPost({action:'update',sheet:'sessions',id:existing.id,row:existing}); }
    else { rec.id = uid(); state.sessions.push(rec); apiPost({action:'add',sheet:'sessions',row:rec}); }
    save(); curMonth = rec.m; closeSheet(); render();
  };
  if (existing) el("f_del").onclick = ()=>{
    apiPost({action:'delete',sheet:'sessions',id:existing.id});
    state.sessions = state.sessions.filter(x=>x.id!==existing.id); save(); closeSheet(); render();
  };
}

/* Google 行事曆「範本連結」：開啟已預填的新增事件頁，使用者確認即建立 */
function calUrl(rec){
  const slot = SLOTS[rec.slot] || SLOTS.full;
  const sh = slot.start, eh = Math.min(sh + (rec.hours||0), 23.983);
  const stamp = h => { const hh=Math.floor(h), mm=Math.round((h-hh)*60);
    return `${YEAR}${pad(rec.m)}${pad(rec.d)}T${pad(hh)}${pad(mm)}00`; };
  const title = `${rec.course}（${rec.role==="main"?"主教":"助教"}）`;
  const details = `時段：${slot.label}\n時數：${rec.hours} 時\n時薪：${fmt(rec.rate)} 元\n金額：${fmt(rec.hours*rec.rate)} 元`;
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent(title)
    + "&dates=" + stamp(sh) + "/" + stamp(eh)
    + "&details=" + encodeURIComponent(details);
}

  if (pe){ paySheet(state.sessions.find(s=>s.id===pe.dataset.edit)); }
  else if (de){ dutySheet(state.duties.find(s=>s.id===de.dataset.editd)); }
  else if (e.target.id==="resetBtn"){ load().then(render); }
});
el("backdrop").addEventListener("click", e=>{ if(e.target===el("backdrop")) closeSheet(); });

state = {sessions:[], duties:[]};
render();
load().then(render);
</script>
</body>
</html>
